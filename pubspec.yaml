name: child_app
description: "Приложение для записи моментов жизни ребенка"
publish_to: 'none'

version: 1.3.1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  
  # Images
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  exif: ^3.3.0
  
  # Charts
  fl_chart: ^0.70.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  
  # Navigation
  go_router: ^14.8.1
  
  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
